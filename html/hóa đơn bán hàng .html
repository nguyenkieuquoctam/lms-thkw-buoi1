<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn bán hàng</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
               background:  linear-gradient(to bottom, #ee0404 5%, #ec6205 75%);
        }
        th {
            background-color: #f2f2f2;
        }
        .text-left {
            text-align: left;
        }
        .bold {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Hóa đơn bán hàng</h2>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên hàng</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
                <th>Đvt</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>A</td>
                <td class="soluong">3</td>
                <td class="dongia">50</td>
                <td>Thùng</td>
                <td class="thanhtien">?</td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
                <td class="soluong">4</td>
                <td class="dongia">70</td>
                <td>Cái</td>
                <td class="thanhtien">?</td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
                <td class="soluong">8</td>
                <td class="dongia">100</td>
                <td>Thùng</td>
                <td class="thanhtien">?</td>
            </tr>
            <tr>
                <td colspan="5" class="text-left bold">Tổng thanh toán</td>
                <td id="tongthanhtoan" class="bold">?</td>
            </tr>
        </tbody>
    </table>

    <script>
        // Lấy danh sách các phần tử theo class giống như ghi chú trên bảng
        let soluong = document.getElementsByClassName("soluong");
        let dongia = document.getElementsByClassName("dongia");
        let thanhtien = document.getElementsByClassName("thanhtien");
        
        let tong = 0;

        // Duyệt qua từng dòng để tính thành tiền
        for (let i = 0; i < soluong.length; i++) {
            // Chuyển dữ liệu text từ HTML thành số để tính toán
            let soLuong = parseFloat(soluong[i].innerText);
            let donGia = parseFloat(dongia[i].innerText);
            
            // Tính thành tiền từng dòng
            let thanhTien = soLuong * donGia;
            
            // Hiển thị kết quả vào cột Thành tiền
            thanhtien[i].innerText = thanhTien;
// Cộng dồn vào tổng thanh toán
            tong += thanhTien;
        }

        // Hiển thị Tổng thanh toán vào ô có id="tongthanhtoan"
        document.getElementById("tongthanhtoan").innerText = tong;
    </script>

</body>
</html>
